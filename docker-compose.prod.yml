version: "3.9"

services:
  db:
    image: postgres:16
    container_name: ccent_postgres_prod
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-CCENT_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set_in_env}
      POSTGRES_DB: ${POSTGRES_DB:-CCENT_db}
    ports: []
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-CCENT_user} -d ${POSTGRES_DB:-CCENT_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build: ./backend
    container_name: ccent_web_prod
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      /bin/sh -lc "mkdir -p /app/staticfiles && python manage.py collectstatic --noinput && exec gunicorn joca.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    restart: unless-stopped

volumes:
  pgdata_prod:
    driver: local
