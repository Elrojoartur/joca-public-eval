{% extends 'ui/base.html' %}
{% block title %}Correo enviado | {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
        <div class="card card-soft">
            <div class="card-body p-4 text-center">
                <h1 class="h4 mb-3">Revisa tu correo</h1>
                <p class="small text-muted">Si el correo está registrado, recibirás un enlace para crear una nueva
                    contraseña. Revisa también tu carpeta de spam.</p>
                <a class="btn btn-outline-primary" href="/acceso/">Volver a acceso</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
