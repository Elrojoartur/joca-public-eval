{% extends "ui/base.html" %}
{% block title %}Reporte académico | {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="card card-soft p-4 mb-4">
  <div class="d-flex justify-content-between align-items-center">
    <div>
      <h1 class="h4 mb-1">Reporte académico</h1>
      <p class="muted mb-0">Resumen por período.</p>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary btn-sm" href="/panel/reportes/">Tablero</a>
      <a class="btn btn-outline-secondary btn-sm" href="/panel/">Panel</a>
    </div>
  </div>
</div>

<div class="card card-soft">
  <div class="card-body table-responsive">
    <table class="table align-middle mb-0">
      <thead><tr><th>Período</th><th>Grupos</th></tr></thead>
      <tbody>
        {% for r in por_periodo %}
          <tr><td>{{ r.periodo }}</td><td>{{ r.grupos }}</td></tr>
        {% empty %}
          <tr><td colspan="2" class="text-muted">Sin datos</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
